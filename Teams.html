<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cricket Hub – Teams</title>
  <link rel="stylesheet" href="mini.css" />
  <style>
    body { background-color: #f0f0f0; color: #111; }
    .page-header {
      background-color: #001f4d;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }
    .teams-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 16px;
    }
    .team-card {
      background-color: #e0e0e0;
      color: #00e5ff;
      width: 220px;
      height: 300px;
      border-radius: 12px;
      text-align: center;
      padding: 20px;
      position: relative;
      box-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff, 0 0 40px #00e5ff;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .team-card:hover {
      box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff, 0 0 60px #ff00ff;
      color: #ff00ff;
    }
    .team-card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
      object-fit: contain;
    }
    .team-card h3 {
      font-size: 18px;
      margin-bottom: 15px;
      color: inherit;
    }
    .team-card .btn {
      background-color: #00e5ff;
      color: black;
      border: none;
      box-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff;
      width: 100%;
    }
    .team-card .btn:hover {
      background-color: #ffea00;
      box-shadow: 0 0 10px #ffea00, 0 0 20px #ffea00;
      color: black;
    }
    @media (max-width: 480px) {
      .team-card { width: 44vw; height: auto; min-height: 220px; }
    }
  </style>
</head>
