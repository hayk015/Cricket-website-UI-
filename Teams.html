<!DOCTYPE html>
<html lang="en">
  <head>
    <title>ICC Team Rankings</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f0f0f0; 
        color: #111             
      }
      header {
        background-color: #001f4d;
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 28px;
        font-weight: bold;
      }
      .teams-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        max-width: 1200px;
        margin: 30px auto;
      }
      .team-card {
        background-color: #e0e0e0;
        color: #00e5ff;         
        width: 220px;
        height: 300px;
        border-radius: 12px;
        text-align: center;
        padding: 20px;
        position: relative;
        box-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff, 0 0 40px #00e5ff; 
        transition: all 0.3s ease;
      }
      .team-card:hover {
        box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff, 0 0 60px #ff00ff;
        color: #ff00ff;
      }

      .team-card img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin-bottom: 15px;
      }
      .team-card h3 {
        font-size: 18px;
        margin-bottom: 15px;
      }
     #btn {
      background-color: #00e5ff; 
      color: black;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      border: none;
      box-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff; 
    }
    #btn:hover {
      background-color: #ffea00; 
      box-shadow: 0 0 10px #ffea00, 0 0 20px #ffea00;
    }

      #back,
      #Home {
        background-color: #001f4d;
        color: white;
        padding: 10px 20px;
        border-radius: 20px solid rgb(47, 0, 255);
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
        margin-right: 10px;
      }
      footer {
        background-color: #0288d1;
        color: white;
        text-align: center;
        padding: 20px 0;
        margin-top: 80px;
      }

      .footer-content h3 {
        margin-bottom: 10px;
        font-size: 20px;
      }

      .footer-content ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 20px;
      }
    </style>
  </head>
