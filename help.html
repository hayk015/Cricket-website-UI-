<!DOCTYPE html>
<html>
  <head>
    <title>Cricket Query Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-image: url("https://thumbs.dreamstime.com/b/test-cricket-match-international-england-india-edgbaston-birmingham-england-uk-64683030.jpg");
        background-size: cover;
        height:100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .query-form {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        width: 350px;
        text-align: center;
      }
      h2 {
        color: #0288d1;
      }
      textarea {
        width: 90%;
        height: 100px;
        padding: 8px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        resize: none;
      }
      button {
        border: 2px solid blue;
        border-radius: 4px;
        margin: 5px 0;
        background-color: rgba(0, 0, 255, 0.1);
        padding: 8px;
        width: 100%;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: rgba(255,0,0,0.4);
        border: 2px solid red;
      }
    </style>
  </head>
  <body>
    <div class="query-form">
      <h2>Help</h2>
      <form id="queryForm">
        <textarea
          id="queryInput"
          placeholder="Type your cricket-related query here..."
        ></textarea>
        <br />
        <button type="submit">Submit</button>
      </form>
    </div>

    <script>
      document
        .getElementById("queryForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const query = document.getElementById("queryInput").value.trim();
          if (query === "") {
            alert("Please enter a query!");
            return;
          }
          alert("Your query has been submitted: ");

          window.location.href = "Mini-Project.html";
        });
    </script>
  </body>
</html>
